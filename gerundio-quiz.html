<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Gerundio — Quiz Interactivo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1927;
    --surface2: #231f38;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --ok: #06d6a0;
    --err: #ef233c;
    --text: #fffffe;
    --muted: #a7a3c2;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(6,214,160,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { max-width: 680px; width: 100%; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 48px; }

  .tag {
    display: inline-block;
    background: rgba(255,107,53,0.15);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,107,53,0.3);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    margin-top: 10px;
    font-weight: 300;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border-radius: 8px;
    height: 6px;
    margin-bottom: 36px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  /* Score */
  .score-display {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent2);
  }
  .score-dot { width: 8px; height: 8px; background: var(--accent2); border-radius: 50%; }

  /* Question card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 16px;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card.active::before { opacity: 1; }

  .q-type {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 24px;
    font-weight: 400;
  }

  .q-text strong { color: var(--accent2); font-weight: 500; }

  /* Fill blank */
  .fill-input {
    display: inline-block;
    position: relative;
  }

  .blank {
    background: var(--surface2);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 8px 14px;
    width: 160px;
    text-align: center;
    transition: border-color 0.3s, background 0.3s;
    outline: none;
    letter-spacing: 0.5px;
  }
  .blank:focus { border-color: var(--accent); background: rgba(255,107,53,0.05); }
  .blank.correct { border-color: var(--ok); background: rgba(6,214,160,0.08); color: var(--ok); }
  .blank.wrong { border-color: var(--err); background: rgba(239,35,60,0.08); color: var(--err); }

  /* Options */
  .options { display: grid; gap: 10px; }
  .options.cols-2 { grid-template-columns: 1fr 1fr; }

  .opt-btn {
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: rgba(255,107,53,0.4);
    background: rgba(255,107,53,0.06);
    transform: translateY(-1px);
  }
  .opt-btn.selected { border-color: var(--accent); background: rgba(255,107,53,0.1); }
  .opt-btn.correct { border-color: var(--ok); background: rgba(6,214,160,0.1); color: var(--ok); }
  .opt-btn.wrong { border-color: var(--err); background: rgba(239,35,60,0.1); color: var(--err); }
  .opt-btn.show-correct { border-color: var(--ok); background: rgba(6,214,160,0.08); }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    width: 24px; height: 24px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    letter-spacing: 0;
  }

  /* Feedback */
  .feedback {
    display: none;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.6;
    margin-top: 16px;
    border-left: 3px solid;
  }
  .feedback.show { display: block; animation: fadeIn 0.3s ease; }
  .feedback.ok { background: rgba(6,214,160,0.08); border-color: var(--ok); color: #a8f0dc; }
  .feedback.bad { background: rgba(239,35,60,0.08); border-color: var(--err); color: #f5a3ae; }

  .feedback strong { font-weight: 500; display: block; margin-bottom: 4px; }
  .feedback .correct-ans { color: var(--ok); font-weight: 500; }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    padding: 14px 28px;
    border-radius: 12px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #ff855a; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* Results */
  .results {
    display: none;
    text-align: center;
    padding: 60px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    animation: fadeIn 0.5s ease;
  }
  .results.show { display: block; }

  .results-emoji { font-size: 64px; margin-bottom: 24px; }

  .results-score {
    font-family: 'Syne', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .results-label {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .results-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }

  .breakdown-item {
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px;
  }
  .breakdown-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .breakdown-num.ok { color: var(--ok); }
  .breakdown-num.bad { color: var(--err); }
  .breakdown-num.neutral { color: var(--accent2); }
  .breakdown-label { font-size: 12px; color: var(--muted); }

  .results-msg {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 32px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .options.cols-2 { grid-template-columns: 1fr; }
    .card { padding: 24px; }
    .btn-row { flex-direction: column; }
    .results-breakdown { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="tag">A2 · B1 · Para brasileños</div>
    <h1>El <span>gerundio</span><br>en la cocina de Bruno</h1>
    <p class="subtitle">Quiz interactivo · 10 preguntas · Corrección inmediata</p>
  </header>

  <div id="quiz-area">
    <div class="progress-meta">
      <span id="q-counter">Pregunta 1 de 10</span>
      <div class="score-display"><div class="score-dot"></div><span id="score-label">0 correctas</span></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:10%"></div>
    </div>

    <div class="card active" id="question-card">
      <!-- dynamically filled -->
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">Comprobar</button>
      <button class="btn btn-ghost" id="next-btn" onclick="nextQuestion()" style="display:none">Siguiente →</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="results-emoji" id="results-emoji"></div>
    <div class="results-score" id="results-score"></div>
    <div class="results-label" id="results-label"></div>
    <div class="results-breakdown">
      <div class="breakdown-item">
        <div class="breakdown-num ok" id="r-correct">0</div>
        <div class="breakdown-label">Correctas ✓</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num bad" id="r-wrong">0</div>
        <div class="breakdown-label">Incorrectas ✗</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num neutral" id="r-pct">0%</div>
        <div class="breakdown-label">Acierto</div>
      </div>
    </div>
    <p class="results-msg" id="results-msg"></p>
    <button class="btn btn-primary" onclick="restartQuiz()">Intentar de nuevo</button>
  </div>
</div>

<script>
const questions = [
  {
    type: 'fill',
    label: 'Completa la frase',
    sentence: 'Bruno está ________ el arroz con verduras.',
    answer: 'preparando',
    verb: 'preparar',
    feedback_ok: '¡Correcto! <em>Preparar</em> es regular: -ar → -ando.',
    feedback_bad: 'La respuesta correcta es <span class="correct-ans">preparando</span>. Verbo regular -ar → -ando.'
  },
  {
    type: 'choice',
    label: '¿Cuál es el gerundio correcto?',
    sentence: 'Diego está ________ las cebollas y llorando un poco.',
    options: ['cortando', 'cortiendo', 'cortendo', 'cortundo'],
    answer: 0,
    feedback_ok: '¡Perfecto! <em>Cortar</em> es regular: -ar → -ando.',
    feedback_bad: 'Lo correcto es <span class="correct-ans">cortando</span>. Solo los verbos -er/-ir usan -iendo.'
  },
  {
    type: 'choice',
    label: 'Elige la forma correcta',
    sentence: 'Los clientes están ________ la carta.',
    options: ['lendo', 'leyendo', 'leendo', 'liendo'],
    answer: 1,
    feedback_ok: '¡Muy bien! <em>Leer</em> → <strong>leyendo</strong>. Patrón vocal+vocal → y.',
    feedback_bad: 'Lo correcto es <span class="correct-ans">leyendo</span>. Vocal+vocal → y: le+iendo = leyendo. ¡No "lendo" como en portugués!'
  },
  {
    type: 'infinitive',
    label: '¿Cuál es el infinitivo?',
    sentence: '"¡Están <strong>pidiendo</strong> la cuenta en la mesa 4!"',
    answer: 'pedir',
    feedback_ok: '¡Correcto! <em>pidiendo</em> → <strong>pedir</strong>. Patrón e→i en verbos -ir.',
    feedback_bad: 'El infinitivo es <span class="correct-ans">pedir</span>. Patrón e→i: ped- → pid-iendo.'
  },
  {
    type: 'choice',
    label: 'Elige la estructura correcta',
    sentence: 'Carmen no puede hablar ahora. ¿Cómo lo decimos en español?',
    options: [
      'Está a hablar por teléfono.',
      'Está hablando por teléfono.',
      'Está hablar por teléfono.',
      'Está de hablando por teléfono.'
    ],
    answer: 1,
    feedback_ok: '¡Exacto! En español siempre es <strong>estar + gerundio</strong>, sin preposición.',
    feedback_bad: 'Lo correcto es <span class="correct-ans">Está hablando por teléfono.</span> La estructura "estar a + infinitivo" es del portugués europeo — ¡no existe en español!'
  },
  {
    type: 'fill',
    label: 'Completa con el gerundio correcto',
    sentence: 'El gato del restaurante está ________ en la silla.',
    answer: 'durmiendo',
    verb: 'dormir',
    feedback_ok: '¡Bien! <em>Dormir</em> → <strong>durmiendo</strong>. Patrón o→u.',
    feedback_bad: 'Lo correcto es <span class="correct-ans">durmiendo</span>. Patrón o→u: dorm- → durm-iendo. No existe "dormiendo".'
  },
  {
    type: 'choice',
    label: '¿Cuál es el gerundio de DECIR?',
    sentence: 'El cliente está ________ que el arroz está frío.',
    options: ['dizendo', 'deciendo', 'diciendo', 'dicendo'],
    answer: 2,
    feedback_ok: '¡Perfecto! <em>Decir</em> → <strong>diciendo</strong>. Patrón e→i.',
    feedback_bad: 'Lo correcto es <span class="correct-ans">diciendo</span>. Patrón e→i, igual que pedir → pidiendo. ¡Cuidado con "dizendo" del portugués!'
  },
  {
    type: 'infinitive',
    label: '¿Cuál es el infinitivo?',
    sentence: '"¿Por qué estás <strong>yendo</strong> tan despacio?"',
    answer: 'ir',
    feedback_ok: '¡Excelente! <em>yendo</em> → <strong>ir</strong>. Patrón especial: ir → yendo.',
    feedback_bad: 'El infinitivo es <span class="correct-ans">ir</span>. Es el único gerundio que empieza con "y": ir → yendo.'
  },
  {
    type: 'choice',
    label: 'Transforma la frase',
    sentence: 'Yo / pedir / ayuda → ¿Cómo se dice?',
    options: [
      'Yo estoy pediendo ayuda.',
      'Yo estoy pidiendo ayuda.',
      'Yo estoy a pedir ayuda.',
      'Yo estoy pedindo ayuda.'
    ],
    answer: 1,
    feedback_ok: '¡Correcto! <em>Pedir</em> → <strong>pidiendo</strong>. Patrón e→i. No existe "pediendo" ni "pedindo".',
    feedback_bad: 'Lo correcto es <span class="correct-ans">Yo estoy pidiendo ayuda.</span> Patrón e→i: ped- → pid-iendo.'
  },
  {
    type: 'choice',
    label: '¿Cuándo se usa ESTAR + gerundio?',
    sentence: 'Elige la opción correcta:',
    options: [
      'Para hablar de hábitos en general.',
      'Para acciones que ocurren ahora mismo.',
      'Para acciones pasadas.',
      'Para dar órdenes.'
    ],
    answer: 1,
    feedback_ok: '¡Exacto! <strong>Estar + gerundio</strong> = acción en progreso, ahora mismo o en ese momento de la historia.',
    feedback_bad: 'La respuesta correcta es <span class="correct-ans">acciones que ocurren ahora mismo</span>. Para hábitos usamos el presente simple: "Bruno trabaja en Barcelona".'
  }
];

let current = 0;
let score = 0;
let answered = false;

function renderQuestion() {
  const q = questions[current];
  const card = document.getElementById('question-card');
  answered = false;

  let html = `<div class="q-type">${q.label}</div>`;
  html += `<div class="q-text">${q.sentence.replace('________', '<span style="color:var(--accent2)">________</span>')}</div>`;

  if (q.type === 'fill') {
    html += `<input class="blank" id="fill-input" type="text" placeholder="escribe aquí..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') checkAnswer()">`;
    html += `<p style="font-size:12px;color:var(--muted);margin-top:10px;">Infinitivo: <em>${q.verb}</em></p>`;
  } else if (q.type === 'infinitive') {
    html += `<input class="blank" id="fill-input" type="text" placeholder="infinitivo..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') checkAnswer()">`;
  } else if (q.type === 'choice') {
    const letters = ['A', 'B', 'C', 'D'];
    html += `<div class="options${q.options.length === 2 ? ' cols-2' : ''}">`;
    q.options.forEach((opt, i) => {
      html += `<button class="opt-btn" id="opt-${i}" onclick="selectOption(${i})" data-index="${i}">
        <span class="opt-letter">${letters[i]}</span>${opt}
      </button>`;
    });
    html += `</div>`;
  }

  html += `<div class="feedback" id="feedback"></div>`;
  card.innerHTML = html;

  document.getElementById('check-btn').style.display = 'block';
  document.getElementById('check-btn').disabled = false;
  document.getElementById('next-btn').style.display = 'none';

  updateMeta();

  if (q.type === 'fill' || q.type === 'infinitive') {
    setTimeout(() => document.getElementById('fill-input')?.focus(), 100);
  }
}

let selectedOption = null;

function selectOption(i) {
  if (answered) return;
  selectedOption = i;
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`opt-${i}`).classList.add('selected');
}

function checkAnswer() {
  if (answered) return;
  const q = questions[current];
  const feedback = document.getElementById('feedback');
  let correct = false;

  if (q.type === 'fill' || q.type === 'infinitive') {
    const input = document.getElementById('fill-input');
    const val = input.value.trim().toLowerCase();
    correct = val === q.answer.toLowerCase();
    input.classList.add(correct ? 'correct' : 'wrong');
    input.disabled = true;
    if (!correct) input.value = val || '—';
  } else {
    if (selectedOption === null) return;
    correct = selectedOption === q.answer;
    document.querySelectorAll('.opt-btn').forEach((b, i) => {
      b.disabled = true;
      b.classList.remove('selected');
      if (i === q.answer) b.classList.add('correct');
      else if (i === selectedOption && !correct) b.classList.add('wrong');
    });
  }

  if (correct) score++;
  answered = true;
  selectedOption = null;

  feedback.innerHTML = correct
    ? `<strong>✓ ¡Correcto!</strong>${q.feedback_ok}`
    : `<strong>✗ Incorrecto.</strong>${q.feedback_bad}`;
  feedback.className = `feedback show ${correct ? 'ok' : 'bad'}`;

  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';
  updateMeta();
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function updateMeta() {
  document.getElementById('q-counter').textContent = `Pregunta ${current + 1} de ${questions.length}`;
  document.getElementById('score-label').textContent = `${score} correcta${score !== 1 ? 's' : ''}`;
  const pct = ((current + (answered ? 1 : 0)) / questions.length) * 100;
  document.getElementById('progress-bar').style.width = `${Math.max(10, pct)}%`;
}

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  const results = document.getElementById('results');
  results.classList.add('show');

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('results-score').textContent = `${score}/${questions.length}`;
  document.getElementById('results-label').textContent = `${pct}% de acierto`;
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = questions.length - score;
  document.getElementById('r-pct').textContent = `${pct}%`;

  let emoji, msg;
  if (pct === 100) {
    emoji = '🏆'; msg = '¡Perfecto! Dominas el gerundio como un nativo. Los irregulares no te dan ningún problema.';
  } else if (pct >= 80) {
    emoji = '🧑‍🍳'; msg = 'Muy bien. Bruno estaría orgulloso. Repasa los irregulares donde fallaste y vuelve a intentarlo.';
  } else if (pct >= 60) {
    emoji = '📋'; msg = 'Bien, pero hay margen de mejora. Vuelve a los patrones irregulares (e→i, o→u, vocal+vocal) antes de intentarlo de nuevo.';
  } else {
    emoji = '🔄'; msg = 'Necesitas repasar la ficha antes de hacer el quiz. Presta especial atención a los irregulares y a la diferencia entre "estar + gerundio" y "estar a + infinitivo".';
  }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-msg').textContent = msg;
}

function restartQuiz() {
  current = 0; score = 0; answered = false; selectedOption = null;
  document.getElementById('results').classList.remove('show');
  document.getElementById('quiz-area').style.display = 'block';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
