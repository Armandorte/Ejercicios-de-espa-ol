<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · El Gerundio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ee;
    --card-front: #ffffff;
    --card-back: #1a1927;
    --accent: #e85d26;
    --accent2: #f5a623;
    --ok: #06c98a;
    --err: #e8294a;
    --text-dark: #1a1927;
    --text-light: #fffffe;
    --muted: #8f8ba5;
    --border: rgba(0,0,0,0.08);
    --shadow: 0 8px 40px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 80px;
    position: relative;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,93,38,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,93,38,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .wrapper { max-width: 600px; width: 100%; position: relative; z-index: 1; }

  /* Header */
  header { text-align: center; margin-bottom: 40px; }

  .tag {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text-dark);
    line-height: 1.1;
  }
  h1 span { color: var(--accent); }

  .subtitle { color: var(--muted); font-size: 14px; margin-top: 8px; }

  /* Mode selector */
  .mode-tabs {
    display: flex;
    background: white;
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1px solid var(--border);
  }
  .mode-tab {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: transparent;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tab.active {
    background: var(--accent);
    color: white;
  }

  /* Progress */
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .deck-info { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--text-dark); }
  .progress-track {
    height: 4px;
    background: rgba(0,0,0,0.08);
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* Flashcard */
  .card-scene {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-3d {
    position: relative;
    width: 100%;
    height: 280px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  }
  .card-3d.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
  }

  .card-front {
    background: white;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .card-back {
    background: var(--card-back);
    box-shadow: var(--shadow);
    transform: rotateY(180deg);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Decorative corner */
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: linear-gradient(135deg, transparent 50%, rgba(232,93,38,0.06) 50%);
    border-radius: 0 24px 0 0;
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.4;
  }
  .card-front .card-label { color: var(--text-dark); }
  .card-back .card-label { color: white; }

  .card-word {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.2rem, 7vw, 3.2rem);
    line-height: 1.1;
    letter-spacing: -1px;
  }
  .card-front .card-word { color: var(--text-dark); }
  .card-back .card-word { color: white; }

  .card-sub {
    font-size: 14px;
    margin-top: 12px;
    font-style: italic;
    opacity: 0.5;
  }
  .card-front .card-sub { color: var(--text-dark); }
  .card-back .card-sub { color: white; }

  .card-pattern {
    display: inline-block;
    margin-top: 14px;
    background: rgba(255,255,255,0.1);
    color: var(--accent2);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .card-pt {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  .card-pt strong { color: rgba(255,255,255,0.8); }

  .card-hint {
    position: absolute;
    bottom: 20px;
    font-size: 11px;
    opacity: 0.35;
    letter-spacing: 0.5px;
  }
  .card-front .card-hint { color: var(--text-dark); }
  .card-back .card-hint { color: white; }

  /* Action buttons — study mode */
  .action-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .action-btn {
    flex: 1;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .action-btn:hover { transform: translateY(-2px); }

  .btn-again {
    background: rgba(232,41,74,0.1);
    color: var(--err);
    border: 2px solid rgba(232,41,74,0.2);
  }
  .btn-again:hover { background: rgba(232,41,74,0.15); }

  .btn-good {
    background: rgba(6,201,138,0.1);
    color: var(--ok);
    border: 2px solid rgba(6,201,138,0.2);
  }
  .btn-good:hover { background: rgba(6,201,138,0.15); }

  /* Nav buttons — browse mode */
  .nav-row {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }

  .nav-btn {
    width: 52px; height: 52px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: white;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); transform: scale(1.05); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  .flip-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text-dark);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    letter-spacing: 0.5px;
  }
  .flip-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    display: none;
  }
  .stats-bar.show { display: flex; }
  .stat-pill {
    flex: 1;
    background: white;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; }
  .stat-num.ok { color: var(--ok); }
  .stat-num.err { color: var(--err); }
  .stat-num.neutral { color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

  /* Completed */
  .completed {
    display: none;
    text-align: center;
    background: white;
    border-radius: 24px;
    padding: 52px 36px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    animation: pop 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .completed.show { display: block; }
  .completed-emoji { font-size: 56px; margin-bottom: 20px; }
  .completed h2 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
  .completed p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 28px; max-width: 360px; margin-left: auto; margin-right: auto; }

  .completed-stats {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .restart-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin: 0 6px;
  }
  .restart-btn:hover { background: #d44f1e; transform: translateY(-1px); }
  .restart-btn.secondary {
    background: transparent;
    color: var(--text-dark);
    border: 2px solid var(--border);
  }
  .restart-btn.secondary:hover { border-color: var(--text-dark); background: transparent; }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .card-3d { animation: slideIn 0.3s ease; }

  @media (max-width: 480px) {
    .card-3d { height: 240px; }
    .card-face { padding: 28px; }
    .action-row { gap: 8px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="tag">Flashcards · A2/B1</div>
    <h1>Gerundios<br><span>irregulares</span></h1>
    <p class="subtitle">La cocina de Bruno · 12 verbos esenciales</p>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('browse')">📖 Ver todas</button>
    <button class="mode-tab" onclick="setMode('study')">🧠 Estudiar</button>
  </div>

  <div id="main-area">
    <div class="stats-bar" id="stats-bar">
      <div class="stat-pill"><div class="stat-num neutral" id="s-total">12</div><div class="stat-label">Total</div></div>
      <div class="stat-pill"><div class="stat-num ok" id="s-ok">0</div><div class="stat-label">Dominadas</div></div>
      <div class="stat-pill"><div class="stat-num err" id="s-repeat">0</div><div class="stat-label">Repetir</div></div>
    </div>

    <div class="progress-row">
      <span class="deck-info" id="deck-info">1 / 12</span>
      <span id="mode-label" style="font-size:12px;color:var(--muted)">Modo: Ver todas</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:8%"></div>
    </div>

    <div class="card-scene" onclick="flipCard()">
      <div class="card-3d" id="card-3d">
        <div class="card-face card-front">
          <div class="card-label">Infinitivo</div>
          <div class="card-word" id="front-word">—</div>
          <div class="card-sub" id="front-sub">—</div>
          <div class="card-hint">Toca para ver el gerundio →</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">Gerundio</div>
          <div class="card-word" id="back-word">—</div>
          <div class="card-pattern" id="back-pattern">—</div>
          <div class="card-pt" id="back-pt">—</div>
          <div class="card-hint">← Toca para volver</div>
        </div>
      </div>
    </div>

    <!-- Browse mode controls -->
    <div class="nav-row" id="browse-controls">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">←</button>
      <button class="flip-btn" onclick="flipCard()">Voltear tarjeta</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">→</button>
    </div>

    <!-- Study mode controls (hidden initially) -->
    <div class="action-row" id="study-controls" style="display:none">
      <button class="action-btn btn-again" onclick="markCard(false)">✗ Repetir</button>
      <button class="action-btn btn-good" onclick="markCard(true)">✓ Lo sé</button>
    </div>
  </div>

  <div class="completed" id="completed">
    <div class="completed-emoji" id="c-emoji">🎉</div>
    <h2 id="c-title">¡Ronda completada!</h2>
    <p id="c-msg"></p>
    <div class="completed-stats">
      <div class="stat-pill"><div class="stat-num ok" id="c-ok">0</div><div class="stat-label">Dominadas</div></div>
      <div class="stat-pill"><div class="stat-num err" id="c-repeat">0</div><div class="stat-label">A repetir</div></div>
    </div>
    <div>
      <button class="restart-btn" onclick="restartStudy(true)">Repetir solo las difíciles</button>
      <button class="restart-btn secondary" onclick="restartStudy(false)">Empezar de nuevo</button>
    </div>
  </div>
</div>

<script>
const cards = [
  { inf: 'leer', ger: 'leyendo', pattern: 'vocal+vocal → y', ptBR: 'lendo (PT) ≠ leyendo (ES)', cat: 'vocal-y' },
  { inf: 'ir', ger: 'yendo', pattern: 'ir → yendo (único)', ptBR: 'indo (PT) ≠ yendo (ES)', cat: 'vocal-y' },
  { inf: 'oír', ger: 'oyendo', pattern: 'vocal+vocal → y', ptBR: 'ouvindo (PT) ≠ oyendo (ES)', cat: 'vocal-y' },
  { inf: 'caer', ger: 'cayendo', pattern: 'vocal+vocal → y', ptBR: 'caindo (PT) ≠ cayendo (ES)', cat: 'vocal-y' },
  { inf: 'pedir', ger: 'pidiendo', pattern: 'e → i (verbos -ir)', ptBR: 'pedindo (PT) ≠ pidiendo (ES)', cat: 'e-i' },
  { inf: 'decir', ger: 'diciendo', pattern: 'e → i (verbos -ir)', ptBR: 'dizendo (PT) ≠ diciendo (ES)', cat: 'e-i' },
  { inf: 'seguir', ger: 'siguiendo', pattern: 'e → i (verbos -ir)', ptBR: 'seguindo (PT) = siguiendo ✓', cat: 'e-i' },
  { inf: 'servir', ger: 'sirviendo', pattern: 'e → i (verbos -ir)', ptBR: 'servindo (PT) ≠ sirviendo (ES)', cat: 'e-i' },
  { inf: 'dormir', ger: 'durmiendo', pattern: 'o → u (verbos -ir)', ptBR: 'dormindo (PT) ≠ durmiendo (ES)', cat: 'o-u' },
  { inf: 'morir', ger: 'muriendo', pattern: 'o → u (verbos -ir)', ptBR: 'morrendo (PT) ≠ muriendo (ES)', cat: 'o-u' },
  { inf: 'poder', ger: 'pudiendo', pattern: 'o → u (verbos -er)', ptBR: 'podendo (PT) ≠ pudiendo (ES)', cat: 'o-u' },
  { inf: 'venir', ger: 'viniendo', pattern: 'e → i (verbos -ir)', ptBR: 'vindo (PT) ≠ viniendo (ES)', cat: 'e-i' },
];

let mode = 'browse';
let current = 0;
let flipped = false;
let studyDeck = [];
let studyIndex = 0;
let okCount = 0;
let repeatCards = [];

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && m==='browse') || (i===1 && m==='study'));
  });

  const browseCtrl = document.getElementById('browse-controls');
  const studyCtrl = document.getElementById('study-controls');
  const statsBar = document.getElementById('stats-bar');
  const modeLabel = document.getElementById('mode-label');

  if (m === 'browse') {
    browseCtrl.style.display = 'flex';
    studyCtrl.style.display = 'none';
    statsBar.classList.remove('show');
    modeLabel.textContent = 'Modo: Ver todas';
    current = 0;
    renderCard(cards[current], current, cards.length);
  } else {
    browseCtrl.style.display = 'none';
    studyCtrl.style.display = 'flex';
    statsBar.classList.add('show');
    modeLabel.textContent = 'Modo: Estudiar';
    startStudy(shuffle([...cards]));
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startStudy(deck) {
  studyDeck = deck;
  studyIndex = 0;
  okCount = 0;
  repeatCards = [];
  document.getElementById('completed').classList.remove('show');
  document.getElementById('main-area').style.display = 'block';
  updateStudyStats();
  renderCard(studyDeck[studyIndex], studyIndex, studyDeck.length);
}

function updateStudyStats() {
  document.getElementById('s-total').textContent = studyDeck.length;
  document.getElementById('s-ok').textContent = okCount;
  document.getElementById('s-repeat').textContent = repeatCards.length;
}

function renderCard(card, idx, total) {
  flipped = false;
  document.getElementById('card-3d').classList.remove('flipped');
  document.getElementById('front-word').textContent = card.inf;
  document.getElementById('front-sub').textContent = card.inf;
  document.getElementById('back-word').textContent = card.ger;
  document.getElementById('back-pattern').textContent = card.pattern;
  document.getElementById('back-pt').innerHTML = `🇧🇷 <strong>${card.ptBR}</strong>`;

  const pct = ((idx + 1) / total) * 100;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('deck-info').textContent = `${idx + 1} / ${total}`;

  if (mode === 'browse') {
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === total - 1;
  }

  // Animate
  const c = document.getElementById('card-3d');
  c.style.animation = 'none';
  requestAnimationFrame(() => { c.style.animation = 'slideIn 0.3s ease'; });
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card-3d').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  current = Math.max(0, Math.min(cards.length - 1, current + dir));
  renderCard(cards[current], current, cards.length);
}

function markCard(knew) {
  if (!flipped) { flipCard(); return; }
  const card = studyDeck[studyIndex];
  if (knew) { okCount++; } else { repeatCards.push(card); }
  updateStudyStats();
  studyIndex++;
  if (studyIndex >= studyDeck.length) {
    showCompleted();
  } else {
    renderCard(studyDeck[studyIndex], studyIndex, studyDeck.length);
  }
}

function showCompleted() {
  document.getElementById('main-area').style.display = 'none';
  const comp = document.getElementById('completed');
  comp.classList.add('show');
  document.getElementById('c-ok').textContent = okCount;
  document.getElementById('c-repeat').textContent = repeatCards.length;
  const pct = Math.round((okCount / studyDeck.length) * 100);
  let emoji, title, msg;
  if (pct === 100) {
    emoji = '🏆'; title = '¡Perfecto!';
    msg = 'Dominas todos los gerundios irregulares. Bruno te contrataría en su cocina sin dudarlo.';
  } else if (pct >= 70) {
    emoji = '🧑‍🍳'; title = '¡Muy bien!';
    msg = `Tienes ${okCount} de ${studyDeck.length} dominadas. Repasa las ${repeatCards.length} que te quedaron y vuelves a por ellas.`;
  } else {
    emoji = '🔄'; title = 'Sigue practicando';
    msg = `Aún hay ${repeatCards.length} tarjetas que necesitan más atención. ¡Vamos a por ellas!`;
  }
  document.getElementById('c-emoji').textContent = emoji;
  document.getElementById('c-title').textContent = title;
  document.getElementById('c-msg').textContent = msg;
}

function restartStudy(onlyHard) {
  const deck = onlyHard && repeatCards.length > 0 ? shuffle([...repeatCards]) : shuffle([...cards]);
  startStudy(deck);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (mode === 'browse') {
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
  } else {
    if (e.key === ' ') { e.preventDefault(); if (!flipped) flipCard(); }
    if (e.key === 'ArrowLeft' && flipped) markCard(false);
    if (e.key === 'ArrowRight' && flipped) markCard(true);
  }
});

// Init
renderCard(cards[current], current, cards.length);
</script>
</body>
</html>
